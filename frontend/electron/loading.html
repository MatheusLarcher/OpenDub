<!doctype html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preparando OpenDub</title>
<style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f3ed;color:#17221e;font-family:Arial,sans-serif}.box{width:min(440px,80vw)}.mark{width:42px;height:42px;display:grid;place-items:center;border-radius:13px 13px 13px 3px;background:#173d2e;color:#fff;font:italic 24px Georgia}h1{font-size:28px;letter-spacing:-1px;margin:24px 0 8px}p{color:#66736b;line-height:1.5}.bar{height:7px;background:#dce3dc;border-radius:9px;overflow:hidden;margin-top:28px}.bar i{display:block;height:100%;background:#4d7a62;border-radius:9px}.bar.is-indeterminate i{width:38%;animation:move 1.3s ease-in-out infinite}.bar:not(.is-indeterminate) i{width:0%;transition:width .3s ease}@keyframes move{50%{transform:translateX(155%)}100%{transform:translateX(0)}}small{display:block;color:#839087;margin-top:14px}</style></head>
<body><div class="box"><div class="mark">O</div><h1>Preparando o OpenDub</h1><p id="message">Verificando os componentes necessários…</p><div class="bar is-indeterminate" id="bar"><i id="bar-fill"></i></div><small id="detail">Na primeira abertura isso pode demorar alguns minutos.</small></div>
<script>window.app?.onSetupProgress(({message,detail,percent})=>{document.getElementById('message').textContent=message;document.getElementById('detail').textContent=detail||'';if(typeof percent==='number'){const bar=document.getElementById('bar');bar.classList.remove('is-indeterminate');document.getElementById('bar-fill').style.width=Math.max(0,Math.min(100,percent))+'%'}})</script></body></html>
